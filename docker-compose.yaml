services:

  postgres:
    image: postgres:16

    container_name: postgres-cep

    environment:
      POSTGRES_DB: cepdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  wiremock:
    image: wiremock/wiremock:3.13.1

    container_name: wiremock-cep

    ports:
      - "8089:8080"

    volumes:
      - ./wiremock:/home/wiremock

volumes:
  postgres_data: